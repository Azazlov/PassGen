name: pass_gen
description: "PassGen — кроссплатформенный менеджер паролей с локальным шифрованием"
homepage: https://github.com/azazlov/passgen
repository: https://github.com/azazlov/passgen
issue_tracker: https://github.com/azazlov/passgen/issues

# Защита от случайной публикации на pub.dev
publish_to: 'none'

# Версия приложения (семантическое версионирование)
# MAJOR.MINOR.PATCH+BUILD
version: 0.5.0+1

environment:
  sdk: ^3.9.0
  flutter: ^3.24.0

# Основные зависимости
dependencies:
  flutter:
    sdk: flutter

  # === UI/UX ===
  # Иконки Cupertino для iOS
  cupertino_icons: ^1.0.8
  
  # Google Fonts для типографики (Material 3)
  google_fonts: ^6.3.2
  
  # Анимации Lottie
  lottie: ^3.0.0
  
  # Индикатор надёжности пароля
  password_strength: ^0.2.0
  zxcvbn: ^1.0.0

  # === State Management ===
  # Provider для управления состоянием (Clean Architecture)
  provider: ^6.1.1

  # === Data & Security ===
  # Криптография (PBKDF2, ChaCha20-Poly1305)
  cryptography: ^2.7.0
  crypto: ^3.0.6
  
  # Генерация UUID
  uuid: ^4.5.1
  
  # Функциональное программирование (Either, Option)
  dartz: ^0.10.1

  # === Database ===
  # SQLite для локального хранения
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2  # Для Desktop (Linux/Windows)
  path: ^1.9.0

  # === Storage ===
  # SharedPreferences для настроек
  shared_preferences: ^2.5.3

  # === File Operations ===
  # Выбор файлов для импорта/экспорта
  file_picker: ^10.3.2
  
  # Доступ к файловой системе
  path_provider: ^2.1.5

  # === Sharing & Export ===
  # Публикация файлов (экспорт паролей)
  share_plus: ^12.0.0
  
  # Открытие ссылок (документация, репозиторий)
  url_launcher: ^6.2.4

  # === Platform Support ===
  # Требуется для работы на всех платформах
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # === Linting ===
  # Рекомендуемые правила для Flutter
  flutter_lints: ^6.0.0

  # === Code Generation ===
  # Генерация иконок приложения
  flutter_launcher_icons: ^0.13.1
  
  # Генерация моков для тестов
  mockito: ^5.4.4
  code_builder: ^4.10.0
  build_runner: ^2.4.9

# Конфигурация flutter_launcher_icons
flutter_launcher_icons:
  # Android
  android: true
  adaptive_icon_background: "#2196F3"  # Синий фон (primary цвет)
  adaptive_icon_foreground: "assets/icons/app_icon_fg_1024.png"
  
  # iOS
  ios: true
  image_path: "assets/icons/app_icon_1024.png"
  image_path_ios_dark_transparent: "assets/icons/app_icon_fg_1024.png"
  
  # Windows
  windows:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    icon_size: 256
  
  # Linux
  linux:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"

  # Web
  web:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    background_color: "#2196F3"
    theme_color: "#2196F3"

# Конфигурация Flutter
flutter:
  # Material Icons
  uses-material-design: true

  # Assets
  assets:
    # Иконки приложения
    - assets/icons/
    
    # Lottie анимации (из новой структуры)
    - project_context/ui_ux_designer/design/animations/
    
    # Документы (опционально, для отображения в приложении)
    - project_context/technical_writer/user_guide.md
    - project_context/technical_writer/faq.md

  # Шрифты (кастомные, при необходимости)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
