name: pass_gen
description: "PassGen — кроссплатформенный менеджер паролей с локальным шифрованием"
homepage: https://github.com/azazlov/passgen
repository: https://github.com/azazlov/passgen
issue_tracker: https://github.com/azazlov/passgen/issues

# Защита от случайной публикации на pub.dev
publish_to: 'none'

# Версия приложения (семантическое версионирование)
# MAJOR.MINOR.PATCH+BUILD
version: 0.5.2+3

environment:
  sdk: ^3.9.0
  flutter: ^3.24.0

# Основные зависимости
dependencies:
  flutter:
    sdk: flutter

  cryptography: ^2.7.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  file_picker: ^10.3.2
  flutter_web_plugins:
    sdk: flutter
  google_fonts: ^6.3.2
  lottie: ^3.0.0
  password_strength: ^0.2.0
  path: ^1.9.0
  path_provider: ^2.1.5
  provider: ^6.1.1
  share_plus: ^12.0.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  url_launcher: ^6.2.4
  uuid: ^4.5.1
  zxcvbn: ^1.0.0

dev_dependencies:
  build_runner: ^2.4.9
  code_builder: ^4.10.0
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

# Конфигурация flutter_launcher_icons
flutter_launcher_icons:
  # Android
  android: true
  adaptive_icon_background: "#2196F3"  # Синий фон (primary цвет)
  adaptive_icon_foreground: "assets/icons/app_icon_fg_1024.png"
  
  # iOS
  ios: true
  image_path: "assets/icons/app_icon_1024.png"
  image_path_ios_dark_transparent: "assets/icons/app_icon_fg_1024.png"
  
  # Windows
  windows:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    icon_size: 256
  
  # Linux
  linux:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"

  # Web
  web:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    background_color: "#2196F3"
    theme_color: "#2196F3"

# Конфигурация Flutter
flutter:
  # Material Icons
  uses-material-design: true

  # Assets
  assets:
    # Иконки приложения
    - assets/icons/

  # Шрифты (кастомные, при необходимости)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
