<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон (прозрачный для foreground) -->
  
  <!-- Основной замок -->
  <g transform="translate(512, 512)">
    <!-- Тело замка -->
    <rect x="-180" y="-80" width="360" height="280" rx="40" fill="#2196F3"/>
    
    <!-- Внутренняя часть замка -->
    <rect x="-140" y="-40" width="280" height="200" rx="20" fill="#64B5F6"/>
    
    <!-- Замочная скважина -->
    <circle cx="0" cy="20" r="35" fill="#2196F3"/>
    <path d="M0 55 L0 90 M-25 90 L25 90" stroke="#2196F3" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Дужка замка -->
    <path d="M-120 -80 C-120 -200 -40 -280 0 -280 C40 -280 120 -200 120 -80" 
          stroke="#2196F3" stroke-width="80" stroke-linecap="round" fill="none"/>
    
    <!-- Блик на дужке -->
    <path d="M-80 -100 C-80 -160 -20 -220 0 -220 C20 -220 80 -160 80 -100" 
          stroke="#64B5F6" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.5"/>
    
    <!-- Буква P (PassGen) -->
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="120" font-weight="bold" 
          fill="white" text-anchor="middle">P</text>
  </g>
  
  <!-- Декоративные элементы (углы) -->
  <g fill="#1976D2" opacity="0.3">
    <circle cx="100" cy="100" r="30"/>
    <circle cx="924" cy="100" r="30"/>
    <circle cx="100" cy="924" r="30"/>
    <circle cx="924" cy="924" r="30"/>
  </g>
</svg>
