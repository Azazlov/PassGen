# Flutter Analysis Options
# Документация: https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # === Предпочтения ===
    # Предпочитать одиночные кавычки
    prefer_single_quotes: true
    
    # Предпочитать const конструкторы
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_const_declarations: true
    
    # Предпочитать final для неизменяемых переменных
    prefer_final_locals: true
    prefer_final_fields: true
    
    # Избегать print в production (разрешено для логирования)
    avoid_print: false
    
    # === Документирование ===
    # Требовать документацию для публичных API
    public_member_api_docs: false  # Включить для релиза
    
    # === Безопасность ===
    # Избегать unsafe HTML (правило удалено — нераспознано)
    # avoid_unsafe_html: false
    
    # Избегать late инициализации без необходимости (правило удалено — нераспознано)
    # avoid_late_keyword: false
    
    # === Чистота кода ===
    # Избегать лишних async/await
    unnecessary_await_in_return: true
    unnecessary_async: true
    
    # Использовать ?? вместо условий
    prefer_is_empty: true
    prefer_is_not_empty: true
    
    # Избегать return в void функциях
    avoid_returning_null_for_void: true
    
    # === Производительность ===
    # Избегать лишних итераций
    unnecessary_lambdas: true
    
    # === Null Safety ===
    # Всегда проверять null
    unnecessary_null_checks: false
    
    # === Organization ===
    # Сортировать импорты
    sort_pub_dependencies: true
    directives_ordering: true
    
    # Группировать импорты
    sort_constructors_first: true
    
    # === Clean Architecture ===
    # Разрешить public зависимости для domain слоя
    implementation_imports: true
    
    # Разрешить dynamic для гибкости
    avoid_dynamic_calls: false

# Исключения для конкретных файлов
analyzer:
  exclude:
    # Сгенерированные файлы
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    
    # Build runner
    - "**/build/**"
    - ".dart_tool/**"
    
    # Внешние зависимости
    - "**/generated/**"
    
    # Временные файлы
    - "**/*.tmp"
    - "**/*.temp"
  
  # Настройки анализатора
  errors:
    # Относиться к TODO как к информации
    todo: ignore
    
    # Относиться к deprecated как к warning
    deprecated_member_use: warning
    
    # Missing return в void функциях
    missing_return: error
    
    # Dead code
    dead_code: warning
    
    # Unused imports
    unused_import: warning
    
    # Unused variables
    unused_local_variable: warning

  # Опции анализатора (удалены — не поддерживаются в текущей версии Flutter)
  # strict-casts: false
  # strict-inference: false
  # strict-raw-types: false
